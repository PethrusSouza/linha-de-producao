<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema OS - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h2>Gestão de Produção</h2>
        <nav>
            <a href="dashboard.html">Ordens de Serviço</a>
            <a href="itens.html">Itens/Produtos</a>
            <a href="usuarios.html">Usuários</a>
        </nav>
    </div>

    <div class="main-content">
    <h1>Controle de Acesso</h1>
    <div class="card">
        <h3>Cadastrar Operador/Gerente</h3>
        <form>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text">
                </div>
                <div class="form-group">
                    <label>Função</label>
                    <input type="text" placeholder="Ex: Supervisor">
                </div>
                <div class="form-group">
                    <label>Usuário (Login)</label>
                    <input type="text">
                </div>
                <div class="form-group">
                    <label>Nível de Acesso</label>
                    <select>
                        <option>ADMIM</option>
                        <option>GERENTE</option>
                        <option>OPERADOR</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password">
                </div>
            </div>
            <button type="submit" style="background: var(--primary);">Registrar Usuário</button>
        </form>
    </div>
</div>
</body>
</html>
